name: frontend
description: "Vastra – AI Interior Fabric Visualizer"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.6.0
  http_parser: ^4.1.2

  # Image handling
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1

  # Storage
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Typography
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
