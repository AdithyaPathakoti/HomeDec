name: frontend
description: "Vastra – AI Interior Fabric Visualizer"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.6.0
  http_parser: ^4.1.2

  # Image handling
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1

  # Storage & persistence
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Typography
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Sharing
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fabrics/
